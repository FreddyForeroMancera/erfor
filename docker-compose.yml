services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: erfor
      POSTGRES_PASSWORD: erfor
      POSTGRES_DB: erfor
    ports:
      - "5432:5432"
    volumes:
      - erfor-postgres:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  erfor-postgres:
